<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Signup</title>
 <link rel="stylesheet" href="style1.css">
</head>
<body>
  <div class="container">
    <div class="form-switch">
      <button class="active" data-target="login-form">Login</button>
      <button data-target="signup-form">Sign Up</button>
    </div>
    <div class="card">
      <form id="login-form" class="active">
      <center><h1>Welcome back </h1></center>
       
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" class="has-toggle" type="password" placeholder="Enter your password" required>
          <button type="button" class="password-toggle" data-target="login-password" aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="actions">
          <a href="#">Forgot password?</a>
          <button type="submit">Login</button>
        </div>
        <div class="switch-link">
          New here? <button type="button" data-target="signup-form">Create an account</button>
        </div>
      </form>
      <form id="signup-form">
       <center><h1>Create Account</h1></center>
        <p>Sign up to start using the platform.</p>
        <div class="field">
          <label for="signup-name">Full Name</label>
          <input id="signup-name" type="text" placeholder="Jane Doe" required>
        </div>
        <div class="field">
          <label for="signup-username">Username</label>
          <input id="signup-username" type="text" placeholder="janedoe" required>
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input id="signup-email" type="email" placeholder="you@example.com"required>
        </div>
        <div class="field">
          <label for="signup-phone">Phone Number</label>
          <input id="signup-phone" type="tel" placeholder="+256700000000" required>
        </div>
        <div class="field">
          <label for="signup-dob">Date of Birth</label>
          <input id="signup-dob" type="date" required>
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <input id="signup-password" class="has-toggle" type="password" placeholder="Choose a password" required>
          <button type="button" class="password-toggle" data-target="signup-password" aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="field">
          <label for="signup-confirm">Confirm Password</label>
          <input id="signup-confirm" class="has-toggle" type="password" placeholder="Confirm password" required>
          <button type="button" class="password-toggle" data-target="signup-confirm" aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="actions">
          <span></span>
          <button type="submit">Sign Up</button>
        </div>
        <div class="switch-link">
          Already have an account? <button type="button" data-target="login-form">Login instead</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    
    const buttons = document.querySelectorAll('.form-switch button, .switch-link button');
    const forms = document.querySelectorAll('form');
    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const targetId = button.dataset.target;
        if (!targetId) return;
        forms.forEach(form => {
          form.classList.toggle('active', form.id === targetId);
        });
        document.querySelectorAll('.form-switch button').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.target === targetId);
        });
      });
    });

    const eyeIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    const eyeOffIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.49 19.49 0 0 1 5.66-6.36"/><path d="M1 1l22 22"/><path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"/><path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/><path d="M18.36 5.64A19.49 19.49 0 0 1 23 12s-4 8-11 8a10.94 10.94 0 0 1-5.94-1.94"/></svg>';
    const passwordToggles = document.querySelectorAll('.password-toggle');
    passwordToggles.forEach(toggle => {
      toggle.addEventListener('click', () => {
        const targetInput = document.getElementById(toggle.dataset.target);
        if (!targetInput) return;
        const isPassword = targetInput.type === 'password';
        targetInput.type = isPassword ? 'text' : 'password';
        toggle.innerHTML = isPassword ? eyeOffIcon : eyeIcon;
        toggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
      });
    });

    const googleSheetsEndpoint = 'appscript'; // Replace with your actual Google Apps Script endpoint  
    const homePage = 'homepage.html';
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const loginEmail = document.getElementById('login-email');
    const loginPassword = document.getElementById('login-password');
    const signupName = document.getElementById('signup-name');
    const signupUsername = document.getElementById('signup-username');
    const signupEmail = document.getElementById('signup-email');
    const signupPhone = document.getElementById('signup-phone');
    const signupDob = document.getElementById('signup-dob');
    const signupPassword = document.getElementById('signup-password');
    const signupConfirm = document.getElementById('signup-confirm');

    async function sendSheetRequest(action, data) {
      try {
        const response = await fetch(`${googleSheetsEndpoint}?action=${encodeURIComponent(action)}`, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });
        return await response.json();
      } catch (error) {
        console.error('Google Sheets request failed:', error);
        return { status: 'error', message: 'Unable to connect to the sheet endpoint.' };
      }
    }

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      const email = loginEmail.value.trim();
      const password = loginPassword.value;
      if (!email || !password) {
        alert('Please enter both email and password.');
        return;
      }
      const result = await sendSheetRequest('login', { email, password });
      if (result.status === 'success') {
        window.location.href = homePage;
      } else {
        alert(result.message || 'Login failed. Please check your credentials.');
      }
    });

    signupForm.addEventListener('submit', async event => {
      event.preventDefault();
      const name = signupName.value.trim();
      const username = signupUsername.value.trim();
      const email = signupEmail.value.trim();
      const phone = signupPhone.value.trim();
      const dob = signupDob.value;
      const password = signupPassword.value;
      const confirm = signupConfirm.value;

      if (!name || !username || !email || !phone || !dob || !password || !confirm) {
        alert('Please fill out all signup fields.');
        return;
      }
      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }

      const result = await sendSheetRequest('signup', {
        name,
        username,
        email,
        phone,
        dob,
        password
      });

      if (result.status === 'success') {
        alert('Signup successful. You can now log in.');
        signupForm.reset();
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
        document.querySelectorAll('.form-switch button').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.target === 'login-form');
        });
      } else {
        alert(result.message || 'Signup failed. Please try again.');
      }
    });


    
  </script>



</body>
</html>
